name: Stage Build & Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy to stage"
        required: true
        default: "master"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack artifact
        run: |
          if [ -d "dist" ]; then
            tar -czf frontend-stage-artifact.tar.gz dist
          elif [ -d "build" ]; then
            tar -czf frontend-stage-artifact.tar.gz build
          else
            echo "No dist/ or build directory found after build"
            exit 1
          fi

      - name: Upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY_UPLOAD }}
          source: "frontend-stage-artifact.tar.gz"
          target: "/var/www/amis/stage/artifacts"
          overwrite: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy stage frontend on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY_DEPLOY }}
          script: |
            deploy-frontend-stage